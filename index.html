<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Generator Mail</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #e0e0e0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 10px; border: 1px solid #333; }
        .section { margin-bottom: 30px; padding: 15px; border: 1px solid #444; border-radius: 8px; }
        .progress-wrapper { background: #333; border-radius: 5px; height: 20px; margin: 10px 0; overflow: hidden; }
        .bar { width: 0%; height: 100%; background: #28a745; transition: width 0.3s; }
        .terminal { background: #000; color: #00ff00; height: 200px; overflow-y: auto; padding: 10px; font-family: monospace; font-size: 12px; }
        button { padding: 10px; cursor: pointer; border: none; border-radius: 5px; color: white; background: #007bff; }
        .btn-gen { background: #ff9800; }
    </style>
</head>
<body>

<div class="container">
    <h2>TERIMA KASIH ATAS PARTISIPASINYA</h2>
    <h3>NO KLAIM</h3>
  <h3>powered by : DPS project</h3>
  <h3>Status: Deleteing</h3>
    
    </div>
</div>

<script>
    const delay = ms => new Promise(res => setTimeout(res, ms));

    // LOGIKA PASSWORD GENERATOR (1 JAM)
    async function generatePassword() {
        const bar = document.getElementById('pass-bar');
        const res = document.getElementById('pass-result');
        res.innerText = "Proses berjalan... (est 36000)";
        
        const duration = 3600; // 3600 detik
        for(let i = 0; i <= 100; i++) {
            bar.style.width = i + "%";
            await delay(duration * 10); // 1 jam total
        }
        res.innerText = "Password: " + Math.random().toString(36).substring(2, 12);
    }

    // LOGIKA GMAIL GENERATOR (1 JAM)
    async function startGmailSimulation() {
        const name = document.getElementById('username').value;
        if(!name) return alert("Masukkan nama!");
        
        const term = document.getElementById('terminal');
        const bar = document.getElementById('gmail-bar');
        
        for (let i = 1; i <= 100; i++) {
            term.innerHTML += `<div>> Dibuat: ${name}${i}@gmail.com</div>`;
            term.scrollTop = term.scrollHeight;
            bar.style.width = (i) + "%";
            await delay(36000); // 36 detik per akun (total 1 jam)
        }
        alert("100 Akun berhasil dibuat.");
    }
</script>
</body>
</html>
